<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/main.css" />

    <title>TypeWell</title>
  </head>
  <body>
    <header>
      <nav>
        <div class="logo"><span>TypeWell</span></div>
        <div class="mode-section">
          <button class="modes">15s</button>
          <button class="modes">30s</button>
          <button class="modes">60s</button>
          <button class="modes">25w</button>
          <button class="modes">50w</button>
        </div>
      </nav>
    </header>
    <section id="typing-section">
      <div class="timer-track">
        <div class="timer-fill"></div>
      </div>
      <div class="passage-card"><div id="passage-content"></div></div>
    </section>
    <footer>Tab + Enter — restart | Esc — reset</footer>
  </body>
  <script src="js/passages.js"></script>
  <script src="js/engine.js"></script>
</html>
