<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/main.css" />

    <title>TypeWell</title>
  </head>
  <body>
    <header>
      <nav>
        <div class="logo"><span>TypeWell</span></div>
        <div class="mode-section">
          <button class="modes" data-mode="60s">60s</button>
          <button class="modes" data-mode="120s">120s</button>
          <button class="modes" data-mode="25w">25w</button>
          <button class="modes" data-mode="50w">50w</button>
          <button class="modes" data-mode="100w">100w</button>
        </div>
      </nav>
    </header>
    <section id="typing-section">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
      <div class="passage-card">
        <div class="passage-options">
          <!-- Increase and Decrease Font Size -->
          <div>
            <button id="increase-font">A</button>
            <button id="decrease-font">a</button>
            <span id="font-size-display"></span>
          </div>

          <!-- Refresh Passage -->
          <div>
            <!-- Restart the test when the refresh is clicked -->
            <button id="refresh-button" title="Refresh the passage">
              <img src="./assets/icons/refreshIcon.svg" alt="Refresh Passage" />
            </button>
          </div>
        </div>

        <!-- ACTUAL CONTENT TO TYPE -->
        <div id="passage-content"></div>

        <div class="countdown">
          <!-- Countdown default is 25 words -->
          <div id="countdown-timer"></div>
          <div id="count-words"></div>
        </div>
      </div>
    </section>
    <footer>
      <div class="commands">Tab+Enter = restart | Esc = reset</div>
    </footer>
    <script type="module" src="js/engine.js"></script>
  </body>
</html>
